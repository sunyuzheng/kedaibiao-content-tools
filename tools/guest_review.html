    .guest-card.rejected  { border-color: rgba(248,113,113,0.35); opacity: 0.6; }
    .guest-card.needs-edit { border-color: rgba(251,191,36,0.4); }

    .guest-name { font-size: 1rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .guest-role    { font-size: 0.78rem; color: #fbbf24; margin-top: 0.15rem; }
    .guest-company { font-size: 0.78rem; color: #a1a1aa; }
    .guest-note    { font-size: 0.72rem; color: #52525b; font-style: italic; margin-top: 0.2rem; }

    .badge-confirmed { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
    .badge-rejected  { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
    .badge-notfound  { background: rgba(113,113,122,0.12); color: #71717a; border: 1px solid rgba(113,113,122,0.3); }
    .badge-added     { background: rgba(74,222,128,0.08); color: #86efac; border: 1px solid rgba(74,222,128,0.2); }
    .badge-needsedit { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }

    .card-body { padding: 0 1.25rem 1rem; }

    .vids-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.6rem; margin: 0.5rem 0 0.75rem; }
    .vid-item { border-radius: 0.6rem; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); transition: all 0.15s; cursor: pointer; }
    .vid-item:hover { border-color: rgba(251,191,36,0.5); }
    .vid-item.sel { border-color: #4ade80; }
    .vid-item.excl { border-color: rgba(248,113,113,0.3); opacity: 0.45; }

    .vid-thumb-wrap { position: relative; }
    .vid-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .vid-sel-badge { position: absolute; top: 0.35rem; right: 0.35rem; width: 1.3rem; height: 1.3rem;
      border-radius: 50%; background: #4ade80; color: #051a05; font-size: 0.7rem; font-weight: 800;

    .vid-footer { padding: 0 0.5rem 0.5rem; display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .vid-btn { padding: 0.15rem 0.5rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);

    .manual-row { display: flex; gap: 0.5rem; }

    .summary-stat { font-size: 0.82rem; color: #71717a; margin-bottom: 0.75rem; }

    .summary-name { font-weight: 600; color: #e4e4e7; min-width: 120px; }
    .summary-detail { color: #71717a; font-size: 0.75rem; }

    .export-btn { margin-top: 1.25rem; padding: 0.55rem 1.5rem; background: rgba(251,191,36,0.12);

    .export-btn:hover { background: rgba(251,191,36,0.22); }
    .export-output { display: none; margin-top: 0.75rem; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 0.5rem; padding: 1rem; font-family: monospace; font-size: 0.72rem; color: #a1a1aa;

    .copy-note { text-align: center; font-size: 0.72rem; color: #4ade80; margin-top: 0.4rem; display: none; }

    .edit-btn:hover { color: #a1a1aa; border-color: rgba(255,255,255,0.25); }
  </style>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let S = {};

function load() {
  try { const v = localStorage.getItem('grev_v2'); if (v) S = JSON.parse(v); } catch(e) {}
}
function save() {
  try { localStorage.setItem('grev_v2', JSON.stringify(S)); } catch(e) {}
}

function gs(id, g) {
  if (!S[id]) S[id] = {
    status: 'pending',
    selVids: g ? g.candidates.map(c => c.vid) : [],
    name: g ? g.name : '', en_name: g ? g.en_name : '',
    role: g ? g.role : '', company: g ? g.company : '',
    manualVid: ''
  };
  return S[id];
}

function ga(idx) {
  const id = 'added_' + idx;
  if (!S[id]) S[id] = { status: 'ok' };
  return S[id];
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function cardDiscovered(d) {
  const sid = 'disc_s_' + d.id;
  if (!S[sid]) S[sid] = { status: 'pending', real_name: '', role: '', company: '' };

  const badgeTxt = st.status === 'confirmed' ? '✓ 已命名' : st.status === 'rejected' ? '✗ 排除' : '❓ 待命名';
  const badgeCls = st.status === 'confirmed' ? 'badge-confirmed' : st.status === 'rejected' ? 'badge-rejected' : 'badge-pending';
  const cardClass = st.status === 'confirmed' ? 'confirmed' : st.status === 'rejected' ? 'rejected' : '';

  const vidHtml = d.vids.map((vid, i) => `
    <div class="vid-item sel">
      <div class="vid-thumb-wrap">
        <a href="https://www.youtube.com/watch?v=${vid}" target="_blank" rel="noopener">
          <img class="vid-thumb" src="https://img.youtube.com/vi/${vid}/mqdefault.jpg" loading="lazy">
        </a>
      </div>
      <div class="vid-title">${d.vid_notes[i] || vid}</div>
      <div class="vid-footer">
        <a href="https://www.youtube.com/watch?v=${vid}" target="_blank" rel="noopener" class="vid-btn yt">▶ YouTube</a>
      </div>
    </div>`).join('');

  return `<div class="guest-card ${cardClass}" id="card_${d.id}">
    <div class="card-header">
      <div>
        <div class="guest-name">${d.current_name}</div>
        <div class="guest-note" style="font-size:.78rem;color:#71717a;margin-top:.2rem">${d.note}</div>
      </div>
      <span class="badge ${badgeCls}">${badgeTxt}</span>
    </div>
    <div class="card-body">
      <div class="info-editor open" style="margin-bottom:.75rem">
        <div class="info-row"><span class="info-label">真实姓名</span><input placeholder="填写嘉宾真实姓名" value="${st.real_name}" oninput="updDisc('${d.id}','real_name',this.value)"></div>
        <div class="info-row"><span class="info-label">职位</span><input placeholder="职位" value="${st.role}" oninput="updDisc('${d.id}','role',this.value)"></div>
        <div class="info-row"><span class="info-label">公司</span><input placeholder="公司" value="${st.company}" oninput="updDisc('${d.id}','company',this.value)"></div>
      </div>
      <div class="vids-grid">${vidHtml}</div>
      <div class="card-actions">
        <button class="btn btn-ok" onclick="setDiscStatus('${d.id}','confirmed')">✓ 确认姓名</button>
        <button class="btn btn-no" onclick="setDiscStatus('${d.id}','rejected')">✗ 不是嘉宾</button>
        <button class="btn btn-grey" onclick="setDiscStatus('${d.id}','pending')">↺ 重置</button>
      </div>
    </div>
  </div>`;
}

function setDiscStatus(id, status) {
  S['disc_s_' + id].status = status;
  save(); render();
}

function updDisc(id, field, val) {
  S['disc_s_' + id][field] = val;
  save();
}

function render() {
  document.getElementById('pendingGrid').innerHTML    = PENDING.map(g => cardPending(g)).join('');
  document.getElementById('discoveredGrid').innerHTML = DISCOVERED.map(d => cardDiscovered(d)).join('');
  document.getElementById('addedGrid').innerHTML      = ADDED.map((g,i) => cardAdded(g,i)).join('');
  renderSummary();
}

function badgeHtml(status, hasCandidates) {
  if (status === 'confirmed') return `<span class="badge badge-confirmed">✓ 确认添加</span>`;
  if (status === 'rejected')  return `<span class="badge badge-rejected">✗ 不添加</span>`;
  if (!hasCandidates)         return `<span class="badge badge-notfound">YouTube 未找到</span>`;
  return `<span class="badge badge-pending">待确认</span>`;
}

function cardPending(g) {
  const st = gs(g.id, g);
  const allVids = [...g.candidates.map(c => c.vid), ...(st.manualVid ? [st.manualVid] : [])];
  const hasCandidates = allVids.length > 0;
  const cardClass = st.status === 'confirmed' ? 'confirmed' : st.status === 'rejected' ? 'rejected' : '';

  const videosHtml = hasCandidates
    ? `<div class="vids-grid">${allVids.map(vid => {
        const title = g.candidates.find(c=>c.vid===vid)?.title || vid;
        const sel = st.selVids.includes(vid);
        return `<div class="vid-item ${sel?'sel':''}" id="vi_${g.id}_${vid}">
          <div class="vid-thumb-wrap">
            <a href="https://www.youtube.com/watch?v=${vid}" target="_blank" rel="noopener">
              <img class="vid-thumb" src="https://img.youtube.com/vi/${vid}/mqdefault.jpg" loading="lazy">
            </a>
            ${sel ? '<div class="vid-sel-badge">✓</div>' : ''}
          </div>
          <div class="vid-title">${title}</div>
          <div class="vid-footer">
            <a href="https://www.youtube.com/watch?v=${vid}" target="_blank" rel="noopener" class="vid-btn yt">▶ YouTube</a>
            <button class="vid-btn" onclick="toggleVid('${g.id}','${vid}')">${sel?'取消':'选中'}</button>
          </div>
        </div>`;
      }).join('')}</div>`
    : `<div class="no-vids">
        <p>⚠ YouTube 频道未找到对应视频（B站有，YouTube 可能未发布 / 已删 / 仅会员）</p>
        <div class="manual-row">
          <input type="text" id="mv_${g.id}" placeholder="手动填入 YouTube 视频 ID（11位字符）" value="${st.manualVid}">
          <button onclick="addManual('${g.id}')">添加</button>
        </div>
      </div>`;

  const confirmDisabled = !hasCandidates && !st.manualVid;

  return `<div class="guest-card ${cardClass}" id="card_${g.id}">
    <div class="card-header">
      <div>
        <div class="guest-name">
          ${st.name}
          <button class="edit-btn" onclick="toggleEditor('${g.id}')">✏ 编辑信息</button>
        </div>
        <div class="guest-role">${st.role}</div>
        ${st.company ? `<div class="guest-company">${st.company}</div>` : ''}
        <div class="guest-note">${g.note}</div>
      </div>
      ${badgeHtml(st.status, hasCandidates)}
    </div>
    <div class="card-body">
      <div class="info-editor" id="editor_${g.id}">
        <div class="info-row"><span class="info-label">中文名</span><input value="${st.name}" oninput="updField('${g.id}','name',this.value)"></div>
        <div class="info-row"><span class="info-label">英文名</span><input value="${st.en_name}" oninput="updField('${g.id}','en_name',this.value)"></div>
        <div class="info-row"><span class="info-label">职位</span><input value="${st.role}" oninput="updField('${g.id}','role',this.value)"></div>
        <div class="info-row"><span class="info-label">公司</span><input value="${st.company}" oninput="updField('${g.id}','company',this.value)"></div>
      </div>
      ${videosHtml}
      <div class="card-actions">
        ${!confirmDisabled ? `<button class="btn btn-ok" onclick="setStatus('${g.id}','confirmed')">✓ 确认添加</button>` : ''}
        <button class="btn btn-no" onclick="setStatus('${g.id}','rejected')">✗ 不添加</button>
        <button class="btn btn-grey" onclick="setStatus('${g.id}','pending')">↺ 重置</button>
      </div>
    </div>
  </div>`;
}

function cardAdded(g, i) {
  const st = ga(i);
  const badgeCls = st.status === 'needs_edit' ? 'badge-needsedit' : 'badge-added';
  const badgeTxt = st.status === 'needs_edit' ? '⚠ 需要修正' : '✓ 已添加';
  const cardClass = st.status === 'needs_edit' ? 'needs-edit' : '';

  return `<div class="guest-card ${cardClass}" id="added_card_${i}">
    <div class="card-header">
      <div>
        <div class="guest-name">${g.name}</div>
        <div class="guest-role">${g.role}</div>
        ${g.company ? `<div class="guest-company">${g.company}</div>` : ''}
        ${g.note ? `<div class="guest-note">${g.note}</div>` : ''}
      </div>
      <span class="badge ${badgeCls}">${badgeTxt}</span>
    </div>
    <div class="card-body">
      <div class="vids-grid">${g.vids.map(vid => `
        <div class="vid-item sel">
          <div class="vid-thumb-wrap">
            <a href="https://www.youtube.com/watch?v=${vid}" target="_blank" rel="noopener">
              <img class="vid-thumb" src="https://img.youtube.com/vi/${vid}/mqdefault.jpg" loading="lazy">
            </a>
          </div>
          <div class="vid-title" style="font-family:monospace">${vid}</div>
          <div class="vid-footer">
            <a href="https://www.youtube.com/watch?v=${vid}" target="_blank" rel="noopener" class="vid-btn yt">▶ YouTube</a>
          </div>
        </div>`).join('')}
      </div>
      <div class="card-actions">
        <button class="btn btn-ok"   onclick="setAddedStatus(${i},'ok')">✓ 信息正确</button>
        <button class="btn btn-warn" onclick="setAddedStatus(${i},'needs_edit')">⚠ 需要修正</button>
      </div>
    </div>
  </div>`;
}

function renderSummary() {
  let confirmed=0, rejected=0, pending=0;
  let html = '';
  PENDING.forEach(g => {
    const st = S[g.id] || { status:'pending', name:g.name };
    const icon = st.status==='confirmed' ? '✅' : st.status==='rejected' ? '❌' : '⏳';
    const detail = st.status==='confirmed'
      ? `添加 [${(st.selVids||[]).join(', ')}]`
      : st.status==='rejected' ? '跳过' : '待决定';
    html += `<div class="summary-item"><span class="summary-name">${icon} ${st.name||g.name}</span><span class="summary-detail">${detail}</span></div>`;
    if (st.status==='confirmed') confirmed++;
    else if (st.status==='rejected') rejected++;
    else pending++;
  });
  document.getElementById('summaryContent').innerHTML =
    `<div class="summary-stat">✅ ${confirmed} 确认  ❌ ${rejected} 排除  ⏳ ${pending} 待定（共 ${PENDING.length}）</div>${html}`;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function toggleVid(guestId, vid) {
  const st = S[guestId];
  const idx = st.selVids.indexOf(vid);
  if (idx >= 0) st.selVids.splice(idx, 1);
  else st.selVids.push(vid);
  save(); render();
}

function setStatus(guestId, status) {
  S[guestId].status = status;
  save(); render();
}

function setAddedStatus(i, status) {
  const id = 'added_' + i;
  if (!S[id]) S[id] = {};
  S[id].status = status;
  save(); render();
}

function toggleEditor(guestId) {
  const el = document.getElementById('editor_' + guestId);
  el.classList.toggle('open');
}

function updField(id, field, val) {
  S[id][field] = val;
  save();
}

function addManual(guestId) {
  const input = document.getElementById('mv_' + guestId);
  let vid = (input.value||'').trim();
  vid = vid.replace(/.*v=/, '').replace(/.*youtu\.be\//, '').split('&')[0].trim();
  if (!vid || vid.length < 5) return;
  S[guestId].manualVid = vid;
  if (!S[guestId].selVids.includes(vid)) S[guestId].selVids.push(vid);
  save(); render();
}

function exportDecisions() {
  const confirmed = PENDING.filter(g => S[g.id]?.status === 'confirmed');
  const out = confirmed.map(g => {
    const st = S[g.id];
    const vids = st.selVids.length ? st.selVids : (st.manualVid ? [st.manualVid] : []);
    const primary = vids[0] || '';
    return {
      guest_name:      st.name    || g.name,
      guest_en_name:   st.en_name || g.en_name,
      guest_title:     st.role    || g.role,
      guest_company:   st.company || g.company,
      primary_video_id: primary,
      all_video_ids:   vids,
      max_views:       0,
      thumbnail_url:   primary ? `https://img.youtube.com/vi/${primary}/hqdefault.jpg` : '',
      primary_url:     primary ? `https://www.youtube.com/watch?v=${primary}` : '',
      episode_count:   vids.length,
      all_urls:        vids.map(v => `https://www.youtube.com/watch?v=${v}`)
    };
  });

  // Also collect "needs_edit" added guests
  const needsEdit = ADDED.filter((g,i) => S['added_'+i]?.status === 'needs_edit').map(g => g.name);

  const result = {
    _instructions: `把 add_guests 里的嘉宾添加到 guests.json，然后按 max_views 降序重排。needs_edit 里的嘉宾信息需要修正，请提示用户。`,
    add_guests: out,
    needs_edit: needsEdit
  };

  const json = JSON.stringify(result, null, 2);
  const el = document.getElementById('exportOutput');
  el.textContent = json;
  el.style.display = 'block';

  navigator.clipboard.writeText(json).then(() => {
    const note = document.getElementById('copyNote');
    note.style.display = 'block';
    setTimeout(() => note.style.display = 'none', 3000);
  }).catch(() => {});
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
load();
PENDING.forEach(g => gs(g.id, g));
ADDED.forEach((g,i) => ga(i));
DISCOVERED.forEach(d => { if (!S['disc_s_'+d.id]) S['disc_s_'+d.id] = {status:'pending',real_name:'',role:'',company:''}; });
render();
setInterval(save, 15000);
</script>
</body>
</html>
